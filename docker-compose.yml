version: '3.8'

services:
  # 后端API服务
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: library_backend_prod
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT:-3306}
      - DB_NAME=${DB_NAME:-library_management}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=24h
      - JWT_REFRESH_EXPIRES_IN=7d
    volumes:
      - ./backend/public/uploads:/app/public/uploads
      - ./backend/logs:/app/logs
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    networks:
      - library_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx反向代理和静态文件服务
  nginx:
    image: nginx:alpine
    container_name: library_nginx_prod
    restart: always
    volumes:
      - ./deployment/nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./admin-panel/dist:/usr/share/nginx/html:ro
      - ./backend/public:/usr/share/nginx/html/api/public:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "8080:8080"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - backend
    networks:
      - library_network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

# 网络配置
networks:
  library_network:
    driver: bridge

# 数据卷配置
volumes: